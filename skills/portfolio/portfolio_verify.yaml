# 持仓分析审视规则
# 权威 PRD → requirement/prd/08-portfolio.md §8.2 · §8.3 · §8.4
# 报告 Verify 详文 → requirement/docs/samples/portfolio-analysis-report-spec.md §9
# 实现 → {APP_ROOT}/src/harness/verify/portfolio.ts（读本文 + portfolio_report_verify Command）

version: 1
schema: portfolio_verify_v1

limits:
  max_position_rows: 100
  max_vision_images_per_turn: 20
  max_web_citations: 5

commands:
  holdings_check: holdings_check_propose
  report_verify: portfolio_report_verify

# ── 持仓提议（holdings_propose · 确认卡前）──

holdings_propose:
  - id: H1
    name: 持仓行数为 0
    check: positions.length >= 1
    fix: 至少录入一笔持仓

  - id: H2
    name: 持仓行数超过上限
    check: positions.length <= max_position_rows
    fix: 删减至 100 行以内或分批录入
    error_code: ERR-HOLDINGS-ROW-LIMIT

  - id: H3
    name: 缺少基金代码或买入日期
    check: each row has fund_code and invested_at
    fix: 补全必填项

  - id: H4
    name: 买入支付金额无效
    check: each row paid_amount > 0
    fix: 补正金额（含申购费）

  - id: H5
    name: 同行键重复
    check: unique(fund_code + invested_at) per row
    fix: 同基不同买入日分行；同日重复须合并或改日期

  - id: H6
    name: 买入日晚于今天
    check: invested_at <= as_of_confirm_date
    fix: 核对买入日期

  - id: H7
    name: 基金代码 L0 不可核验
    check: fund_code exists in L0 onshore public fund
    fix: 核对代码或说明非本期支持品种

  - id: H8
    name: Vision 缺买入日或支付金额
    check: vision source rows have invested_at and paid_amount before card
    fix: 对话补全（PORT-VISION-01）

  - id: H9
    name: change_summary 缺失
    check: change_summary.kind in [initial, update] and narrative non_empty on confirm payload
    fix: 生成对客变更摘要

# ── 分析报告（portfolio_report_verify · PORT-VERIFY）──

portfolio_report:
  checks:
    - id: R1
      name: 标题符合 PORT-NAME-01
      check: title matches variant template with YYYYMMDD

    - id: R2
      name: 缺 §一 完整持仓明细表
      check: section 您的当前持仓 has table rows == positions count
      decision_id: PORT-HOLDINGS-IN-REPORT-01

    - id: R3
      name: 文首无数据截止日
      check: subtitle contains as_of_trade_date

    - id: R4
      name: 缺三句话或持仓速览
      check: sections present

    - id: R5
      name: §一 缺测算说明或收益双列
      check: estimate disclaimer and pnl_abs and pnl_pct columns
      decision_id: PORT-RETURN-ESTIMATE-01

    - id: R6
      name: 图表数量不符（应为2个）
      check: echarts count == 2
      decision_id: PORT-VISUAL-01

    - id: R7
      name: 正文含内部术语
      check: no L0 L1 chunk RAG holdings_versions in body

    - id: R8
      name: 版式不合规
      check: RPT-PORT-FORMAT-01 dividers; no 本章回答; no compose markers
      decision_id: RPT-PORT-FORMAT-01

    - id: R9
      name: 正文含未剥离 compose 占位符
      check: no PORT-* HTML comment markers in body
      decision_id: PORT-COMPOSE-01

    - id: R10
      name: §七 缺必触发风险项
      check: PORT-RISK-01 rules when thresholds met
      decision_id: PORT-RISK-01

risk_rules:
  decision_id: PORT-RISK-01
  rules:
    - id: RR1
      trigger: single_fund_paid_pct >= 30
      section: 风险与合规
      topic: 单基集中度
    - id: RR2
      trigger: top3_paid_pct >= 60
      section: 风险与合规
      topic: 持仓集中
    - id: RR3
      trigger: qdii_market_pct >= 30
      section: 风险与合规
      topic: QDII 披露节奏
      also_header: PORT-02
    - id: RR4
      trigger: sector_theme_in_equity_pct >= 50
      section: 风险与合规
      topic: 行业集中
    - id: RR5
      trigger: has_enhanced_bond
      section: 风险与合规
      topic: 债券增强弹性
    - id: RR6
      trigger: always
      section: 风险与合规
      topic: 测算口径与非投资建议

report_overlay:
  decision_id: RPT-OVERLAY-01
  when: port.rpt.wait
  rules:
    - overlay must not contradict holdings snapshot numbers or fund_code
    - report_draft regenerate must call report_overlay_merge

output:
  holdings_fail_template: 持仓草案问题清单
  report_fail_template: 持仓分析报告校验清单
  pass_requirement: active checks count equals 0
