# 资产配置方案审视规则（Hook1 冲突 · Hook2 漏洞）
# 权威 PRD → requirement/prd/07-allocation-plan.md §7.3 · §7.4.2 · §7.4.3
# 实现 → {APP_ROOT}/src/harness/verify/plan.ts（读本文 + 调 plan_check_* Command）
# 变更须与 PRD §7.3 同步

version: 1
schema: plan_verify_v1

commands:
  hook1: plan_check_conflicts
  hook2: plan_check_completeness

parameters:
  step:
    type: integer
    enum: [1, 2]
    description: 第一步仅跑大类规则；第二步跑全部规则

tolerances:
  allocation_sum_pct: 0.5
  constraint_amount_sum: 0

hook1_conflicts:
  - id: 1
    steps: [1, 2]
    name: 大类比例之和不等于100%
    check: sum(target_allocation.categories[].allocation_pct) within 100 ± allocation_sum_pct
    fix: 归一化或用户确认取整

  - id: 2
    steps: [1, 2]
    name: 权益合计与回撤/风险档位明显不匹配
    check: equity_pct vs goal.max_drawdown and goal.risk_tolerance
    fix: 降权益或改约束（须确认）

  - id: 3
    steps: [1, 2]
    name: 隐含收益与期望收益偏差过大
    check: implied_return vs goal.expected_return
    fix: 调比例或下调预期

  - id: 4
    steps: [1, 2]
    name: 投资期限短但高权益或长锁品类
    check: goal.investment_horizon short AND high_equity_or_illiquid
    fix: 增货基/短债或改约束期限

  - id: 5
    steps: [1, 2]
    name: 流动性需求与低流动性品类矛盾
    check: goal.liquidity_need vs illiquid_categories
    fix: 调高流动性仓位

  - id: 6
    steps: [1, 2]
    name: 禁投品类出现在草案
    check: forbidden_categories intersect proposed_categories
    fix: 移除禁投类

  - id: 7
    steps: [1, 2]
    name: 含非中国公募基金
    check: all instruments are onshore_public_fund per PRD §0.8
    fix: 剔除

  - id: 8
    steps: [1, 2]
    name: 活跃约束组金额合计超客户信息层上限
    check: sum(active_goal_amounts) <= profile.basic_info limits tolerance constraint_amount_sum
    fix: 调金额或停用某组

  - id: 9
    steps: [1]
    name: 养老约束长期但大类偏短债-only且无说明
    check: retirement_horizon long AND bond_only_without_rationale
    fix: 补 allocation_rationale

  - id: 10
    steps: [1]
    name: 缺少 allocation_rationale
    check: allocation_rationale non_empty
    fix: 必填

  - id: 11
    steps: [2]
    name: 分批模式但缺 deploy_frequency
    check: deploy_mode=phased implies deploy_frequency present
    fix: 用户明确频率

  - id: 13
    steps: [2]
    name: detailed_plan 与 target_allocation 大类比例不一致
    check: category totals match target_allocation
    fix: 对齐两步

  - id: 14
    steps: [2]
    name: detailed_plan 含无效 fund_code
    check: each fund_code valid onshore_public_fund
    fix: 剔除/换标的

  - id: 15
    steps: [2]
    name: 某大类有明细但缺 recommendation_reason
    check: each item has recommendation_reason
    fix: 逐项补原因

  - id: 16
    steps: [2]
    name: 第一步已禁投品类出现在 detailed_plan
    check: forbidden_categories not in detailed_plan
    fix: 移除

hook2_completeness:
  - id: 1
    steps: [1]
    name: 缺少 allocation_rationale 段落
    check: allocation_rationale length >= 1 paragraph
    fix: 补整体设计原因

  - id: 2
    steps: [1]
    name: 大类无流动性/回撤粗估
    check: allocation_rationale mentions liquidity and drawdown ranges from profile md
    fix: 区间说明（非联网）

  - id: 5
    steps: [2]
    name: 教育/买房约束未体现到期前流动性
    check: education_or_housing goals have liquidity plan in execution or rationale
    fix: 流动性安排

  - id: 6
    steps: [2]
    name: 大类下无具体 fund_code
    check: each non_empty category has >= 1 fund_code
    fix: 每类至少 1 只公募

  - id: 8
    steps: [2]
    name: 缺分批频率
    check: execution_schedule complete for deploy_mode
    fix: 补齐 execution_schedule

hook2_sector:
  decision_id: PL-PLAN-SECTOR-01
  steps: [2]
  rules:
    - id: S1
      name: 股票类仅1只行业主题且类内>50%
      fix: 说明集中度或增配宽基/全市场分散
    - id: S2
      name: 用户已明确行业偏好但明细未体现
      fix: 按偏好重选或聊天澄清
    - id: S3
      name: 股票类非空但缺行业/风格结构说明
      fix: 补对客段落与类内结构图
    - id: S5
      name: 未指定行业且无看好方向却硬塞行业主题
      fix: 宽基+全市场分散（卫星0）

hook2_deploy:
  decision_id: PL-PLAN-DEPLOY-01
  steps: [2]
  rules:
    - id: D1
      name: phased 但无 fund_deploy 或首期/定投表
      fix: 补逐基金分工
    - id: D2
      name: 货币类 dca_in_periodic=true
      fix: initial_full + dca_in_periodic=false
    - id: D3
      name: 仅有总金额/期数无分基金表
      fix: 补首期/定投/不参与定投三块
    - id: D4
      name: 债/混债 fund_deploy 无 note 或无法解释分批
      fix: 补波动来源与分批理由（PL-PLAN-DEPLOY-BOND-01）

output:
  hook1_fail_template: 方案矛盾清单
  hook2_fail_template: 方案缺项清单
  pass_requirement: count equals 0 for active step rules
