# Agent / Skill / Command 注册表（单一数据源）
# 同步目标：① `/` Command 补全  ② 侧栏「使用说明」Command 表  ③ Harness list_commands
# PRD：requirement/prd/05-chat-shared.md §5.3.9a（五场景 `/`）
#       chat → 05-chat-qa.md §5.3.9b · fund → 09-fund-analysis §9.4
#       profile §6.9.1 · plan §7.7.1 · portfolio §8.7 · §5.3.11
# 编码仓：复制到 {APP_ROOT}/agents/registry.yaml（见 requirement/CODING.md §2）
# 变更后：运行 `python scripts/validate_registry.py`（可选）

version: "1.0.0"
updated: "2026-06-21"

command_types:
  read: 读
  propose: 提议
  write: 写
  meta: 元
  ops: 运维

agents:
  scene:
    - id: scene_chat
      description_zh: 自由问答
    - id: scene_profile
      description_zh: 需求梳理
    - id: scene_plan
      description_zh: 资产配置
    - id: scene_portfolio
      description_zh: 持仓分析
    - id: scene_fund
      description_zh: 基金解读
  infra:
    - id: infra_md_writer
      description_zh: 写本地报告 md 与 report_index
    - id: infra_db_read
      description_zh: 读 Supabase 业务表
    - id: infra_db_write
      description_zh: 写 Supabase（仅用户确认后）
    - id: infra_fund_knowledge_read
      description_zh: 基金披露库 FTS / explore
    - id: infra_fund_knowledge_write
      description_zh: 知识库上传、转 md、重建索引（API/CLI）

skills:
  - id: fund_qa
    scene: fund
    path: app-config/skills/fund/fund_skill.md
    description_zh: 正在回答您关于这只基金的问题…
  - id: fund_full_report
    scene: fund
    path: app-config/skills/fund/fund_skill.md
    description_zh: 正在生成基金解读报告…
  - id: profile_intake
    scene: profile
    path: app-config/skills/profile/profile_skill.md
    description_zh: 正在梳理客户信息与投资需求…
  - id: goal_constraint_intake
    scene: profile
    path: app-config/skills/profile/profile_skill.md
    description_zh: 正在整理本组投资需求…
  - id: profile_report
    scene: profile
    path: app-config/skills/profile/report.template.zh.md
    description_zh: 正在撰写投资需求报告…
  - id: plan_allocation
    scene: plan
    path: app-config/skills/plan/allocation_skill.md
    description_zh: 正在生成资产配置方案…
  - id: plan_report
    scene: plan
    path: app-config/skills/plan/report.template.zh.md
    description_zh: 正在撰写投资规划书…
  - id: portfolio_intake
    scene: portfolio
    path: app-config/skills/portfolio/portfolio_skill.md
    description_zh: 正在录入或分析持仓…
  - id: portfolio_report
    scene: portfolio
    path: app-config/skills/portfolio/report.template.zh.md
    description_zh: 正在撰写持仓分析报告…
  - id: hyperframes
    scene: chat
    path: app-config/skills/hyperframes/SKILL.md
    description_zh: HTML 视频合成与动画制作（HyperFrames 入口 Skill）
  - id: hyperframes_core
    scene: chat
    path: app-config/skills/hyperframes-core/SKILL.md
    description_zh: HyperFrames 合成契约与 Tailwind v4 运行时规范
  - id: hyperframes_animation
    scene: chat
    path: app-config/skills/hyperframes-animation/SKILL.md
    description_zh: HyperFrames 动画与 GSAP / CSS / Three.js 等运行时适配
  - id: hyperframes_cli
    scene: chat
    path: app-config/skills/hyperframes-cli/SKILL.md
    description_zh: HyperFrames CLI：init / lint / preview / render / doctor
  - id: general_video
    scene: chat
    path: app-config/skills/general-video/SKILL.md
    description_zh: 通用 HTML 视频制作工作流

commands:
  # --- 全场景 / 多场景 ---
  - id: web_search
    description_zh: 检索公开资讯
    type: read
    scenes: [chat, profile, plan, portfolio, fund]
    slash_completion: true
    harness_tool: web_search

  - id: compact
    description_zh: 压缩对话上下文
    type: meta
    scenes: [chat, profile, plan, portfolio, fund]
    slash_completion: false
    harness_tool: compact

  - id: report_read
    description_zh: 读取已发布报告快照（深链 / id）
    type: read
    scenes: [chat, profile, plan, portfolio, fund]
    slash_completion: false
    harness_tool: report_read

  - id: artifact_read
    description_zh: 读取 propose 全量 payload
    type: read
    scenes: [profile, plan, portfolio]
    slash_completion: false
    harness_tool: artifact_read

  - id: vision_parse
    description_zh: 解析图片内容
    type: read
    scenes: [chat, profile, plan, portfolio, fund]
    slash_completion: true
    harness_tool: vision_parse

  - id: report_publish
    description_zh: 发布至「我的报告」
    type: write
    scenes: [profile, plan, portfolio, fund]
    slash_completion: true
    requires_confirm: true
    harness_tool: report_publish

  # --- 需求梳理 ---
  - id: profile_read
    description_zh: 读取投资需求摘要
    type: read
    scenes: [profile, plan, fund]
    slash_completion: true
    harness_tool: profile_read

  - id: profile_propose
    description_zh: 提议更新投资需求
    type: propose
    scenes: [profile]
    slash_completion: true
    requires_confirm: true
    harness_tool: profile_propose

  - id: profile_confirm
    description_zh: 确认并保存投资需求
    type: write
    scenes: [profile]
    slash_completion: true
    requires_confirm: true
    harness_tool: profile_confirm

  - id: profile_reset_goals
    description_zh: 重置投资约束：删除所有活跃场景的投资目标约束，以便重新设定
    type: write
    scenes: [profile]
    slash_completion: true
    requires_confirm: true
    harness_tool: profile_reset_goals

  # --- 资产配置 ---
  - id: plan_read
    description_zh: 读取当前资产配置
    type: read
    scenes: [plan, portfolio]
    slash_completion: true
    harness_tool: plan_read

  - id: plan_propose
    description_zh: 提议资产配置（大类或明细）
    type: propose
    scenes: [plan]
    slash_completion: true
    requires_confirm: true
    harness_tool: plan_propose

  - id: plan_confirm
    description_zh: 确认并保存资产配置
    type: write
    scenes: [plan]
    slash_completion: true
    requires_confirm: true
    harness_tool: plan_confirm

  - id: plan_screen_funds
    description_zh: 全市场初筛候选基金（第二步内部）
    type: read
    scenes: [plan]
    slash_completion: false
    harness_tool: plan_screen_funds

  - id: report_overlay_patch
    description_zh: 追加或修订报告-only 段落
    type: write
    scenes: [plan, portfolio, fund, profile]
    slash_completion: false
    harness_tool: report_overlay_patch

  - id: report_overlay_merge
    description_zh: 合并 report_overlay 进草稿
    type: meta
    scenes: [plan, portfolio, fund, profile]
    slash_completion: false
    harness_tool: report_overlay_merge

  - id: report_draft
    description_zh: 撰写报告草稿
    type: propose
    scenes: [profile, plan, portfolio, fund]
    slash_completion: true
    harness_tool: report_draft

  # --- 持仓 ---
  - id: holdings_read
    description_zh: 读取当前持仓
    type: read
    scenes: [portfolio]
    slash_completion: true
    harness_tool: holdings_read

  - id: holdings_propose
    description_zh: 提议更新持仓
    type: propose
    scenes: [portfolio]
    slash_completion: true
    requires_confirm: true
    harness_tool: holdings_propose

  - id: holdings_confirm
    description_zh: 确认并保存持仓
    type: write
    scenes: [portfolio]
    slash_completion: true
    requires_confirm: true
    harness_tool: holdings_confirm

  # --- 基金域 · ① 解析（PRD §5.3.9a · 09-fund-analysis.md §9.4）---
  - id: fund_lookup
    description_zh: 查询基金基本信息与行情
    type: read
    scenes: [fund, portfolio]
    slash_completion: true
    fund_domain: analysis
    harness_tool: fund_lookup

  - id: fund_knowledge_explore
    description_zh: 检索基金披露文件
    type: read
    scenes: [fund]
    slash_completion: true
    fund_domain: analysis
    harness_tool: fund_knowledge_explore

  - id: fund_knowledge_semantic_search
    description_zh: 检索常见问题与观点
    type: read
    scenes: [fund]
    slash_completion: true
    fund_domain: analysis
    harness_tool: fund_knowledge_semantic_search

  - id: seed_sync
    description_zh: 同步所有种子基金L0行情数据
    type: ops
    scenes: [fund]
    slash_completion: true
    harness_tool: seed_sync

  # --- 基金域 · ② 自选（09-fund-watchlist.md §4.3.3）---
  - id: fund_search
    description_zh: 搜索可添加的基金
    type: read
    scenes: [fund]
    slash_completion: true
    fund_domain: watchlist
    harness_tool: fund_search

  - id: fund_watchlist_add
    description_zh: 加入我的自选
    type: write
    scenes: [fund]
    slash_completion: true
    fund_domain: watchlist
    requires_confirm: true
    harness_tool: fund_watchlist_add

  - id: fund_watchlist_remove
    description_zh: 从我的自选移除
    type: write
    scenes: [fund]
    slash_completion: true
    fund_domain: watchlist
    requires_confirm: true
    harness_tool: fund_watchlist_remove

# CLI / 运维（不在聊天 `/` 补全；使用说明 · 基金知识库页展示）
cli_commands:
  - id: fund-knowledge.index
    cli: fund-knowledge index
    description_zh: 更新披露搜索索引
    type: ops
    fund_domain: knowledge

  - id: fund-knowledge.explore
    cli: fund-knowledge explore
    description_zh: 调试：检索披露块
    type: ops
    fund_domain: knowledge

  - id: fund-knowledge.semantic-index
    cli: fund-knowledge semantic index
    description_zh: 更新语义向量索引
    type: ops
    fund_domain: knowledge

  - id: hyperframes.doctor
    cli: npx hyperframes doctor
    description_zh: 检查 HyperFrames 环境（Node / FFmpeg / Chrome）
    type: ops

  - id: hyperframes.lint
    cli: npx hyperframes lint
    description_zh: 校验 HyperFrames 合成 HTML 结构
    type: ops

  - id: hyperframes.preview
    cli: npx hyperframes preview
    description_zh: 启动 HyperFrames Studio 预览（需先 init 项目）
    type: ops

  - id: hyperframes.render
    cli: npx hyperframes render
    description_zh: 渲染 HyperFrames 合成为 MP4
    type: ops

# 侧栏「使用说明」页 · Command 分组（与 slash 同源）
usage_pages:
  chat:
    title: 自由问答
    groups:
      - title: 常用
        command_ids: [web_search, vision_parse]
      - title: HyperFrames 视频（运维）
        cli_command_ids:
          - hyperframes.doctor
          - hyperframes.lint
          - hyperframes.preview
          - hyperframes.render
  profile:
    title: 需求梳理
    groups:
      - title: 投资需求
        command_ids:
          [profile_read, profile_propose, profile_confirm, profile_reset_goals, report_draft, report_publish, vision_parse]
      - title: 常用
        command_ids: [web_search]
  plan:
    title: 资产配置
    groups:
      - title: 方案
        command_ids: [plan_read, plan_propose, plan_confirm, report_draft, report_publish, vision_parse]
      - title: 常用
        command_ids: [web_search]
  portfolio:
    title: 持仓分析
    groups:
      - title: 持仓
        command_ids: [holdings_read, holdings_propose, holdings_confirm, vision_parse, report_draft, report_publish]
      - title: 分析（内部 Gather）
        command_ids: [fund_lookup, plan_read]
      - title: 常用
        command_ids: [web_search]
  fund:
    title: 基金解读
    groups:
      - title: 基金解析
        command_ids:
          - fund_lookup
          - fund_knowledge_explore
          - fund_knowledge_semantic_search
          - web_search
          - vision_parse
          - profile_read
          - report_draft
          - report_publish
      - title: 我的自选
        command_ids: [fund_search, fund_watchlist_add, fund_watchlist_remove]
      - title: 基金知识库（运维）
        command_ids: [seed_sync]
        cli_command_ids:
          - fund-knowledge.index
          - fund-knowledge.explore
          - fund-knowledge.semantic-index
