<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>报告 Markdown · 本地预览</title>
  <!-- 固定 marked v4，避免 CDN latest 的 API 不兼容导致整页脚本失效 -->
  <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <style>
    :root {
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --bg: #f8fafc;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.65;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 20px;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }
    header h1 { margin: 0; font-size: 16px; font-weight: 600; }
    header p { margin: 4px 0 0; font-size: 13px; color: var(--muted); }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    button {
      font-size: 13px;
      padding: 8px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
    }
    button.primary { background: #16a34a; border-color: #16a34a; color: #fff; }
    button.secondary { background: #f1f5f9; }
    #file-input { position: absolute; width: 0; height: 0; opacity: 0; pointer-events: none; }
    .status-bar {
      padding: 8px 20px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }
    .status-bar.ok { background: #f0fdf4; color: #166534; }
    .status-bar.err { background: #fef2f2; color: #b91c1c; }
    .hint-bar {
      background: #fffbeb;
      border-bottom: 1px solid #fde68a;
      padding: 10px 20px;
      font-size: 13px;
      color: #92400e;
    }
    .hint-bar.hidden { display: none; }
    main { max-width: 920px; margin: 0 auto; padding: 24px 20px 48px; }
    #report {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 32px;
      min-height: 120px;
    }
    #report.report-md-body { min-height: 120px; }
    .echarts-host {
      width: 100%;
      height: 420px;
      margin: 16px 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
    }
    .empty { text-align: center; padding: 48px 24px; color: var(--muted); }
    footer { text-align: center; font-size: 12px; color: var(--muted); padding: 16px; }
    #report.report-md-body pre { overflow-x: auto; background: #f8fafc; padding: 12px; border-radius: 6px; }
  </style>
  <link rel="stylesheet" href="report-heading-numbers.css" />
  <link rel="stylesheet" href="report-format.css" />
</head>
<body>
  <header>
    <div>
      <h1>报告 Markdown · 本地预览</h1>
      <p>在浏览器中渲染 <code> ```echarts </code> · 对齐 <code>ReportMarkdownPreview</code></p>
    </div>
    <div class="actions">
      <label style="font-size:13px;color:var(--muted);">样例：
        <select id="sample-select" style="font-size:13px;padding:6px 8px;border-radius:6px;border:1px solid var(--border);">
          <option value="fund-analysis-report-sample.md">基金解读</option>
          <option value="plan-allocation-report-sample.md">资产配置方案</option>
          <option value="portfolio-analysis-report-sample-variant-a.md">持仓分析（无方案）</option>
          <option value="portfolio-analysis-report-sample.md">持仓分析（对照方案）</option>
          <option value="profile-investment-requirements-report-sample.md">投资需求</option>
          <option value="echarts-smoke-test.md">ECharts 冒烟</option>
        </select>
      </label>
      <button type="button" class="primary" id="btn-pick">选择 .md 文件</button>
      <button type="button" class="secondary" id="btn-sample">加载样例</button>
      <input type="file" id="file-input" accept=".md,text/markdown,text/plain,*/*" />
    </div>
  </header>
  <div class="status-bar" id="status-bar">请选择 .md 文件，或双击 open-preview.cmd</div>
  <div class="hint-bar hidden" id="file-protocol-hint"></div>
  <main>
    <article id="report" class="report-md-body">
      <div class="empty" id="welcome"></div>
    </article>
  </main>
  <footer>开发预览用 · 对客验收仍以 App Preview 为准</footer>

  <script>
    (function () {
      const SAMPLES = {
        fund: "fund-analysis-report-sample.md",
        plan: "plan-allocation-report-sample.md",
        portfolio: "portfolio-analysis-report-sample.md",
        portfolio_a: "portfolio-analysis-report-sample-variant-a.md",
        profile: "profile-investment-requirements-report-sample.md",
        echarts: "echarts-smoke-test.md",
      };

      function resolveSamplePath() {
        const params = new URLSearchParams(location.search);
        const key = params.get("sample");
        if (key && SAMPLES[key]) return SAMPLES[key];
        const file = params.get("file");
        if (file) return file;
        const sel = document.getElementById("sample-select");
        return sel ? sel.value : SAMPLES.fund;
      }

      function syncSelectFromPath(path) {
        const sel = document.getElementById("sample-select");
        if (!sel) return;
        for (let i = 0; i < sel.options.length; i++) {
          if (sel.options[i].value === path) {
            sel.selectedIndex = i;
            break;
          }
        }
      }
      const isFileProtocol = location.protocol === "file:";
      const chartQueue = [];

      function setStatus(msg, kind) {
        const bar = document.getElementById("status-bar");
        bar.textContent = msg;
        bar.className = "status-bar" + (kind ? " " + kind : "");
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function queueChart(id, jsonText) {
        chartQueue.push({ id: id, jsonText: jsonText });
      }

      function renderCharts() {
        if (typeof echarts === "undefined") {
          throw new Error("ECharts 库未加载，请检查网络能否访问 jsDelivr CDN");
        }
        const items = chartQueue.splice(0, chartQueue.length);
        items.forEach(function (item) {
          const el = document.getElementById(item.id);
          if (!el) return;
          try {
            const opt = JSON.parse(item.jsonText);
            const chart = echarts.init(el);
            chart.setOption(opt);
            window.addEventListener("resize", function () {
              chart.resize();
            });
          } catch (e) {
            el.innerHTML =
              '<pre style="color:#dc2626;padding:12px;font-size:12px;">ECharts 渲染失败: ' +
              escapeHtml(String(e)) +
              "</pre>";
          }
        });
        return items.length;
      }

      /** 先拆 echarts 块，其余交给 marked v4 */
      function mdToHtml(md) {
        if (typeof marked === "undefined") {
          throw new Error("marked 库未加载，请检查网络");
        }

        const parts = md.split(/(```echarts[\s\S]*?```)/g);
        let html = "";

        parts.forEach(function (part) {
          const m = part.match(/^```echarts\r?\n([\s\S]*?)```$/);
          if (m) {
            const id = "echarts-" + Math.random().toString(36).slice(2, 10);
            queueChart(id, m[1].trim());
            html += '<div id="' + id + '" class="echarts-host"></div>\n';
            return;
          }
          if (part.trim()) {
            html += marked.parse(part, { gfm: true, breaks: false });
          }
        });

        return html;
      }

      function renderMarkdown(md, fileName) {
        try {
          chartQueue.length = 0;
          const html = mdToHtml(md);
          document.getElementById("report").innerHTML = html;
          const chartCount = renderCharts();
          setStatus(
            "已加载：" +
              (fileName || "文档") +
              " · 共 " +
              chartCount +
              " 个 ECharts 图表",
            "ok"
          );
        } catch (e) {
          console.error(e);
          document.getElementById("report").innerHTML =
            '<div class="empty"><p><strong>渲染失败</strong></p><pre style="text-align:left;color:#b91c1c;">' +
            escapeHtml(String(e)) +
            "</pre></div>";
          setStatus("渲染失败：" + e.message, "err");
        }
      }

      function showWelcome() {
        const el = document.getElementById("welcome");
        if (isFileProtocol) {
          el.innerHTML =
            "<p><strong>请点击上方绿色「选择 .md 文件」</strong></p>" +
            "<p>选中 <code>echarts-smoke-test.md</code> 后，本页会立即显示内容与图表。</p>" +
            "<p>或双击 <code>open-preview.cmd</code> 用 localhost 打开。</p>";
        } else {
          el.innerHTML = "<p>正在尝试加载 sample…</p>";
        }
      }

      function pickFile() {
        document.getElementById("file-input").click();
      }

      async function loadSample() {
        const samplePath = resolveSamplePath();
        syncSelectFromPath(samplePath);
        if (isFileProtocol) {
          pickFile();
          const hint = document.getElementById("file-protocol-hint");
          hint.classList.remove("hidden");
          hint.textContent =
            "file:// 下请在选择框里选中 " + samplePath;
          return;
        }
        setStatus("正在加载 " + samplePath + " …");
        try {
          const res = await fetch("./" + samplePath);
          if (!res.ok) throw new Error("HTTP " + res.status);
          renderMarkdown(await res.text(), samplePath);
        } catch (e) {
          setStatus("无法 fetch sample：" + e.message, "err");
          document.getElementById("report").innerHTML =
            '<div class="empty"><p>请双击 <code>open-preview.cmd</code>，或手动「选择 .md 文件」。</p></div>';
        }
      }

      document.getElementById("btn-pick").addEventListener("click", pickFile);
      document.getElementById("btn-sample").addEventListener("click", loadSample);
      document.getElementById("sample-select").addEventListener("change", loadSample);

      document.getElementById("file-input").addEventListener("change", function (ev) {
        const file = ev.target.files && ev.target.files[0];
        if (!file) {
          setStatus("未选择文件", "err");
          return;
        }
        document.getElementById("file-protocol-hint").classList.add("hidden");
        setStatus("正在读取 " + file.name + " …");

        const reader = new FileReader();
        reader.onerror = function () {
          setStatus("读取文件失败", "err");
        };
        reader.onload = function () {
          renderMarkdown(String(reader.result || ""), file.name);
        };
        reader.readAsText(file, "UTF-8");
        // 允许重复选同一文件
        ev.target.value = "";
      });

      showWelcome();
      if (!isFileProtocol && location.protocol.startsWith("http")) {
        const params = new URLSearchParams(location.search);
        if (params.get("sample") || params.get("file")) {
          const sel = document.getElementById("sample-select");
          const key = params.get("sample");
          if (key === "portfolio" && sel) {
            sel.value = SAMPLES.portfolio;
          }
        }
        loadSample();
      } else {
        setStatus("请点击「选择 .md 文件」，或双击 open-preview.cmd 后用 localhost 打开");
      }
    })();
  </script>
</body>
</html>
